# fly.toml app configuration file generated for flightright on 2026-03-03T09:54:25-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'flightright'
primary_region = 'iad'

swap_size_mb = 512

[processes]
  app = "python -m uvicorn flightright.api.app:app --host 0.0.0.0 --port 8080 --workers 1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[mounts]
  source = "flightright_data"
  destination = "/data"

[env]
  FLIGHTRIGHT_AIRPORTS_CSV = "/data/meta/airports.csv"
  FLIGHTRIGHT_RANKINGS_DIR = "/data/meta/airport_rankings"
  FLIGHTRIGHT_META_BUCKET = "flightright-models"
  FLIGHTRIGHT_AIRCRAFT_REGISTRY_CSV = "/data/meta/aircraft_registry_clean.csv"
  FLIGHTRIGHT_REMOTE_CACHE_DIR = "/data/remote_models_cache"
  FLIGHTRIGHT_S3_BUCKET = "flightright-models"
  FLIGHTRIGHT_S3_PREFIX = "models/"
  FLIGHTRIGHT_S3_ENDPOINT = "https://s3.us-east-1.idrivee2.com"
  FLIGHTRIGHT_AIRPORTS_N = "50"
  FLIGHTRIGHT_MODEL_YEARS = "23-25"

[[vm]]
  # choose a bigger size from: fly platform vm-sizes
  size = "performance-2x"
  cpu_kind = "performance"
  cpus = 2
  memory = "8gb"