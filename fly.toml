# fly.toml app configuration file generated for flightright on 2026-03-03T09:54:25-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "flightright"
primary_region = "iad"

[processes]
  app = "python -m uvicorn flightright.api.app:app --host 0.0.0.0 --port 8080"

[env]
  FLIGHTRIGHT_AIRPORTS_CSV = "/data/meta/airports.csv"
  FLIGHTRIGHT_RANKINGS_DIR = "/data/meta/airport_rankings"
  FLIGHTRIGHT_META_BUCKET = "flightright-models"
  FLIGHTRIGHT_AIRCRAFT_REGISTRY_CSV = "/data/meta/aircraft_registry_clean.csv"
  FLIGHTRIGHT_REMOTE_CACHE_DIR = "/data/remote_models_cache"
  FLIGHTRIGHT_S3_BUCKET = "flightright-models"
  FLIGHTRIGHT_S3_PREFIX = "models/"
  FLIGHTRIGHT_S3_ENDPOINT = "https://s3.us-east-1.idrivee2.com"
  FLIGHTRIGHT_AIRPORTS_N = "50"
  FLIGHTRIGHT_MODEL_YEARS = "23-25"

[mounts]
  source = "flightright_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true

  # Keep it always on (your current intent)
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # Optional but nice: don’t let a burst of requests overwhelm a single VM
  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

  # Health check: FastAPI always serves this if the app is up
  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/openapi.json"

[[vm]]
  memory = "2gb"
  cpus = 1